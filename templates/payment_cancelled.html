{% extends 'base.html' %}

{% block title %}Payment Cancelled - Krushi{% endblock %}

{% block content %}
<section class="status-page">
  <div class="container">
    <div class="status-card">
      <div class="status-icon" style="color:#b91c1c;">
        <i class="fas fa-times-circle" style="font-size:64px;"></i>
      </div>
      <h1>Payment Cancelled</h1>
      <p>Your payment was cancelled or did not complete. Your cart is preserved so you can try again.</p>
      <div class="status-actions">
        <a href="{% url 'checkout' %}" class="btn btn-primary">Return to Checkout</a>
        <a href="{% url 'view_cart' %}" class="btn btn-secondary">View Cart</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
